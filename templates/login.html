<!DOCTYPE html>
<html lang="so">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cash Agance — Gal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.13.3/cdn.min.js" defer></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Plus Jakarta Sans',sans-serif;}
body{background:#0d1b2a;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;position:relative;overflow:hidden;}
body::before{content:'';position:absolute;top:-120px;right:-120px;width:500px;height:500px;background:radial-gradient(circle,rgba(0,200,150,.12) 0%,transparent 65%);border-radius:50%;pointer-events:none;}
body::after{content:'';position:absolute;bottom:-100px;left:-80px;width:400px;height:400px;background:radial-gradient(circle,rgba(0,150,255,.08) 0%,transparent 65%);border-radius:50%;pointer-events:none;}
.login-box{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:28px;padding:clamp(28px,4vw,48px) clamp(24px,4vw,44px);width:min(440px,92vw);backdrop-filter:blur(20px);position:relative;z-index:2;animation:fadeUp .4s ease forwards;}
.logo-row{display:flex;align-items:center;gap:12px;margin-bottom:32px;}
.logo-icon{width:46px;height:46px;background:#00c896;border-radius:13px;display:flex;align-items:center;justify-content:center;}
.logo-text{font-size:22px;font-weight:800;color:white;}
.logo-badge{background:rgba(0,200,150,.2);color:#00c896;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;border:1px solid rgba(0,200,150,.3);}
h1{font-size:clamp(22px,4vw,28px);font-weight:800;color:white;margin-bottom:6px;}
.subtitle{font-size:13px;color:rgba(255,255,255,.4);margin-bottom:32px;}
.inp-wrap{margin-bottom:18px;}
.inp-label{font-size:12px;font-weight:600;color:rgba(255,255,255,.45);display:block;margin-bottom:8px;letter-spacing:.3px;text-transform:uppercase;}
.inp-rel{position:relative;}
.inp{width:100%;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:13px;padding:14px 16px 14px 44px;font-size:15px;font-family:'Plus Jakarta Sans',sans-serif;color:white;outline:none;transition:border-color .2s,background .2s;}
.inp::placeholder{color:rgba(255,255,255,.2);}
.inp:focus{border-color:#00c896;background:rgba(0,200,150,.07);}
.inp-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.3);pointer-events:none;}
.show-pass{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.3);cursor:pointer;background:none;border:none;padding:0;}
.btn-login{width:100%;background:#00c896;color:white;border-radius:14px;padding:15px;font-size:15px;font-weight:700;border:none;cursor:pointer;box-shadow:0 4px 24px rgba(0,200,150,.35);transition:transform .15s,box-shadow .2s;margin-top:8px;}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 8px 30px rgba(0,200,150,.45);}
.btn-login:active{transform:scale(.98);}
.error-msg{background:rgba(255,77,109,.15);border:1px solid rgba(255,77,109,.3);color:#ff4d6d;border-radius:12px;padding:11px 14px;font-size:13px;font-weight:600;margin-bottom:16px;}
.footer-note{text-align:center;margin-top:20px;font-size:12px;color:rgba(255,255,255,.2);}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body x-data="{showPass:false}">

<div class="login-box">
  <div class="logo-row">
    <div class="logo-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2">
        <rect x="2" y="5" width="20" height="14" rx="3"/><path d="M2 10h20"/>
      </svg>
    </div>
    <span class="logo-text">Cash Agance</span>
    <span class="logo-badge">AGENT</span>
  </div>

  <h1>Soo Gal</h1>
  <p class="subtitle">Geli xogta si aad u gasho akoonkaaga</p>

  {% if messages %}
    {% for message in messages %}
      <div class="error-msg">{{ message }}</div>
    {% endfor %}
  {% endif %}

  <form method="post" action="{% url 'login' %}">
    {% csrf_token %}

    <div class="inp-wrap">
      <label class="inp-label" for="email">Username</label>
      <div class="inp-rel">
        <input id="email" name="username" type="text" name="username"
               placeholder="username" class="inp"
               value="{{ request.POST.username|default:'' }}" autocomplete="email">
        <svg class="inp-icon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
      </div>
    </div>

    <div class="inp-wrap">
      <label class="inp-label" for="password">Password</label>
      <div class="inp-rel">
        <input id="password" name="password"
               :type="showPass ? 'text' : 'password'"
               
               placeholder="••••••••" class="inp" autocomplete="current-password">
        <svg class="inp-icon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <button type="button" class="show-pass" @click="showPass=!showPass">
          <svg x-show="!showPass" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
          <svg x-show="showPass" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
    </div>

    <button type="submit" class="btn-login">Gal →</button>
  </form>

  <p class="footer-note">Cash Agance App v6.0 &nbsp;·&nbsp; © 2026</p>
</div>

</body>
</html>
