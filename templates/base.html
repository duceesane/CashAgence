<!DOCTYPE html>
<html lang="so">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>{% block title %}Cash Agance{% endblock %}</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.13.3/cdn.min.js" defer></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;width:100%;font-family:'Plus Jakarta Sans',sans-serif;background:#0d1b2a;overflow:hidden;}
.app{width:100vw;height:100vh;display:flex;flex-direction:column;background:#f2f4f7;overflow:hidden;position:relative;}
.body-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.body-scroll::-webkit-scrollbar{display:none;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:clamp(10px,2vw,18px) clamp(14px,4vw,28px);background:#f2f4f7;flex-shrink:0;}
.topbar-title{font-size:clamp(17px,4vw,22px);font-weight:800;color:#0d1b2a;}
.logo-box{width:clamp(32px,5vw,40px);height:clamp(32px,5vw,40px);background:#00c896;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.menu-btn{width:clamp(34px,5vw,40px);height:clamp(34px,5vw,40px);background:white;border-radius:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;box-shadow:0 2px 8px rgba(0,0,0,.07);cursor:pointer;flex-shrink:0;border:none;}
.menu-btn span{display:block;height:2px;background:#0d1b2a;border-radius:2px;}
.menu-btn span:nth-child(1){width:16px;}.menu-btn span:nth-child(2){width:12px;}.menu-btn span:nth-child(3){width:16px;}
.page-header{display:flex;align-items:center;gap:12px;padding:clamp(10px,2vw,16px) clamp(14px,4vw,24px);background:white;border-bottom:1px solid #f0f0f0;flex-shrink:0;}
.back-btn{width:36px;height:36px;background:#f2f4f7;border-radius:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;border:none;text-decoration:none;}
.header-title{font-size:clamp(15px,3.5vw,18px);font-weight:700;color:#0d1b2a;}
.balance-card{background:linear-gradient(135deg,#0d1b2a 0%,#163447 60%,#0d2d3a 100%);border-radius:clamp(18px,3vw,26px);margin:0 clamp(12px,3vw,20px);padding:clamp(18px,3vw,26px);position:relative;overflow:hidden;flex-shrink:0;}
.balance-card::before{content:'';position:absolute;top:-50px;right:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(0,200,150,.13) 0%,transparent 70%);border-radius:50%;}
.balance-label{color:rgba(255,255,255,.55);font-size:clamp(11px,2.5vw,13px);font-weight:500;margin-bottom:clamp(4px,1vw,8px);}
.balance-amount{color:white;font-size:clamp(26px,7vw,38px);font-weight:800;letter-spacing:-1px;margin-bottom:clamp(12px,2.5vw,22px);}
.block-label{color:rgba(255,255,255,.4);font-size:clamp(9px,2vw,11px);font-weight:600;letter-spacing:.5px;text-transform:uppercase;}
.block-amount{color:white;font-size:clamp(14px,3.5vw,18px);font-weight:700;}
.help-btn{background:rgba(255,255,255,.12);border-radius:14px;padding:clamp(8px,1.5vw,11px) clamp(10px,2vw,14px);display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;}
.action-row{display:flex;gap:clamp(8px,2vw,14px);margin:clamp(10px,2vw,16px) clamp(12px,3vw,20px) 0;}
.action-card{background:white;border-radius:clamp(14px,3vw,20px);padding:clamp(14px,2.5vw,20px);display:flex;flex-direction:column;align-items:center;gap:clamp(8px,1.5vw,12px);box-shadow:0 2px 10px rgba(0,0,0,.06);cursor:pointer;flex:1;border:none;transition:transform .15s;text-decoration:none;}
.action-card:active{transform:scale(.97);}
.action-icon{width:clamp(42px,8vw,52px);height:clamp(42px,8vw,52px);border-radius:clamp(12px,2vw,16px);display:flex;align-items:center;justify-content:center;}
.action-label{font-size:clamp(12px,2.5vw,14px);font-weight:600;color:#0d1b2a;}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:clamp(10px,2vw,16px) clamp(12px,3vw,20px) clamp(6px,1vw,10px);}
.section-title{font-size:clamp(15px,3.5vw,19px);font-weight:800;color:#0d1b2a;}
.see-all{font-size:clamp(11px,2.5vw,13px);font-weight:600;color:#00c896;cursor:pointer;background:none;border:none;text-decoration:none;}
.wallet-card{background:white;border-radius:clamp(14px,3vw,20px);margin:0 clamp(12px,3vw,20px) clamp(10px,2vw,14px);padding:clamp(14px,2.5vw,20px);box-shadow:0 2px 12px rgba(0,0,0,.06);cursor:pointer;text-decoration:none;display:block;}
.wallet-logo{width:clamp(38px,7vw,46px);height:clamp(38px,7vw,46px);background:#f3f4f6;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:clamp(11px,2.5vw,13px);font-weight:800;color:#0d1b2a;flex-shrink:0;}
.wallet-name{font-size:clamp(13px,3vw,15px);font-weight:700;color:#0d1b2a;}
.wallet-loc{font-size:clamp(10px,2.5vw,12px);color:#9ca3af;}
.stat-box{flex:1;background:#f9fafb;border-radius:10px;padding:clamp(8px,1.5vw,12px);}
.stat-label{font-size:clamp(9px,2vw,11px);color:#9ca3af;font-weight:500;margin-bottom:3px;text-transform:uppercase;}
.stat-value{font-size:clamp(14px,3.5vw,17px);font-weight:800;color:#0d1b2a;}
.epos-row{background:#f0fdf9;border-radius:12px;padding:clamp(9px,1.8vw,13px) clamp(12px,2.5vw,16px);display:flex;justify-content:space-between;align-items:center;margin-top:clamp(10px,2vw,13px);}
.bottom-nav{display:flex;align-items:center;justify-content:space-around;background:white;border-top:1px solid #f0f0f0;padding:clamp(8px,1.5vw,12px) 0 clamp(12px,2vw,20px);flex-shrink:0;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:0 clamp(6px,2vw,14px);text-decoration:none;}
.nav-label{font-size:clamp(9px,2vw,11px);font-weight:600;}
.fab{width:clamp(44px,8vw,52px);height:clamp(44px,8vw,52px);background:#00c896;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(0,200,150,.4);cursor:pointer;margin-top:-14px;border:none;}
.form-card{background:white;border-radius:clamp(16px,3vw,22px);padding:clamp(16px,3vw,22px);box-shadow:0 2px 14px rgba(0,0,0,.06);margin:0 clamp(12px,3vw,20px);}
.input-wrap{margin-bottom:clamp(12px,2vw,18px);}
.input-label{font-size:clamp(12px,2.5vw,13px);font-weight:600;color:#6b7280;display:block;margin-bottom:7px;}
.input-field{width:100%;border:1.5px solid #e5e7eb;border-radius:13px;padding:clamp(12px,2vw,15px) clamp(12px,2vw,16px);font-size:clamp(13px,3vw,15px);font-family:'Plus Jakarta Sans',sans-serif;outline:none;background:#fafafa;transition:border-color .2s;color:#0d1b2a;}
.input-field:focus{border-color:#00c896;background:white;}
.input-rel{position:relative;}
.input-prefix{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:clamp(13px,3vw,16px);font-weight:700;}
.btn-green{width:100%;background:#00c896;color:white;border-radius:14px;padding:clamp(13px,2.5vw,16px);font-size:clamp(13px,3vw,15px);font-weight:700;border:none;cursor:pointer;box-shadow:0 4px 18px rgba(0,200,150,.3);transition:transform .15s;}
.btn-green:active{transform:scale(.98);}
.btn-red-outline{width:100%;background:transparent;color:#ff4d6d;border-radius:14px;padding:clamp(13px,2.5vw,16px);font-size:clamp(13px,3vw,15px);font-weight:700;border:1.5px solid #fecdd3;cursor:pointer;margin-top:12px;}
.btn-payout{width:100%;background:#ff4d6d;color:white;border-radius:14px;padding:clamp(13px,2.5vw,16px);font-size:clamp(13px,3vw,15px);font-weight:700;border:none;cursor:pointer;box-shadow:0 4px 18px rgba(255,77,109,.3);transition:transform .15s;}
.warn-box{background:#fff8f0;border-radius:12px;padding:clamp(10px,2vw,13px) clamp(12px,2.5vw,15px);display:flex;gap:9px;align-items:flex-start;margin-bottom:clamp(14px,2.5vw,18px);}
.txn-item{display:flex;justify-content:space-between;align-items:center;padding:clamp(10px,2vw,14px) 0;border-bottom:1px solid #f3f4f6;}
.txn-item:last-child{border-bottom:none;}
.txn-icon{width:clamp(34px,6vw,42px);height:clamp(34px,6vw,42px);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:clamp(13px,3vw,16px);flex-shrink:0;}
.txn-name{font-size:clamp(12px,2.8vw,14px);font-weight:600;color:#0d1b2a;}
.txn-time{font-size:clamp(10px,2vw,12px);color:#9ca3af;}
.txn-amt{font-size:clamp(13px,3vw,15px);font-weight:700;}
.avatar{width:clamp(60px,12vw,76px);height:clamp(60px,12vw,76px);background:linear-gradient(135deg,#00c896,#0097e6);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:clamp(22px,5vw,28px);font-weight:700;color:white;margin:0 auto clamp(10px,2vw,14px);}
.menu-row{display:flex;justify-content:space-between;align-items:center;padding:clamp(13px,2vw,16px) clamp(14px,3vw,18px);border-bottom:1px solid #f3f4f6;cursor:pointer;text-decoration:none;}
.menu-row:last-child{border-bottom:none;}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:clamp(10px,2vw,13px) 0;border-bottom:1px solid #f3f4f6;}
.detail-row:last-child{border-bottom:none;}
.chip{padding:clamp(5px,1vw,7px) clamp(10px,2vw,14px);border-radius:20px;font-size:clamp(11px,2.5vw,13px);font-weight:600;cursor:pointer;white-space:nowrap;border:none;text-decoration:none;}
.chip-on{background:#0d1b2a;color:white;}
.chip-off{background:white;color:#888;border:1.5px solid #e5e7eb;}
.info-card{background:white;border-radius:clamp(14px,3vw,20px);padding:clamp(14px,2.5vw,18px);box-shadow:0 2px 10px rgba(0,0,0,.05);}
.dark-card{background:linear-gradient(135deg,#0d1b2a,#163447);border-radius:clamp(14px,3vw,20px);padding:clamp(14px,2.5vw,18px);}
.green{color:#00c896;}.red{color:#ff4d6d;}
.row{display:flex;align-items:center;}
.dot{width:7px;height:7px;border-radius:50%;}
/* Messages (Django) */
.msg-toast{position:absolute;top:clamp(55px,10vw,70px);left:50%;transform:translateX(-50%);z-index:999;white-space:nowrap;color:white;padding:clamp(10px,2vw,13px) clamp(18px,4vw,26px);border-radius:30px;font-size:clamp(12px,2.5vw,14px);font-weight:700;box-shadow:0 6px 24px rgba(0,0,0,.3);}
.msg-success{background:#00c896;}
.msg-error{background:#ff4d6d;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.app{animation:fadeUp .22s ease forwards;}
</style>
{% block extra_head %}{% endblock %}
</head>
<body>
<div class="app">
  {% include "partials/messages.html" %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
