{% extends "base.html" %}


{% block title %}Top-Up — Cash Agance{% endblock %}

{% block content %}
<!-- Header Section -->
<div class="page-header">
  <a href="{% url 'dashboard'%}" class="back-btn">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#0d1b2a" stroke-width="2.5">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
  </a>
  <span class="header-title">Top-Up</span>
</div>

<div class="body-scroll" style="padding:clamp(14px,3vw,22px) 0;">
  <!-- Icon & Title Section -->
  <div style="text-align:center;margin-bottom:clamp(14px,3vw,20px);">
    <div style="width:clamp(52px,10vw,66px);height:clamp(52px,10vw,66px);background:#e8fdf5;
                border-radius:18px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:9px;">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#00c896" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/>
      </svg>
    </div>
    <p style="font-size:clamp(16px,4vw,20px);font-weight:800;color:#0d1b2a;">Ku Dar Lacag</p>
    <p style="font-size:clamp(11px,2.5vw,13px);color:#9ca3af;margin-top:3px;">
      Geli xogta si aad u buuxiso
    </p>
  </div>

  <!-- Form Card Section (Halkan ayaan isku dhex geynaa) -->
  <div class="form-card">
    <form method="post" action="{% url 'topup'%}">
      {% csrf_token %}

      <!-- Wallet Selection -->
      <div class="input-wrap">
        <label class="input-label">Dooro Nooca Lacagta </label>
        <select name="type_money" class="input-field">
          <option value="zaad">EVC Plus </option>
          
          <option value="edahab">e-Dahab</option>
        </select>
      </div>

      <!-- Amount Input -->
      <div class="input-wrap">
        <label class="input-label">Cadadka Lacagta</label>
        <div class="input-rel">
          <span class="input-prefix green">$</span>
          <input type="number" name="amount" step="0.01" min="1"
                 placeholder="0.00" class="input-field" style="padding-left:28px;" required>
        </div>
      </div>

          <!-- Number Input -->
      <div class="input-wrap">
        <label class="input-label">Gali lambarka kaso direeso </label>
        <div class="input-rel">
          
          <input type="number" name="phone" 
                 placeholder="Number" class="input-field" style="padding-left:28px;" required>
        </div>
      </div>
    
    
      <button type="submit" class="btn-green">Xaqiiji Top-Up</button>
    </form>
  </div>
</div>
{% endblock %}
